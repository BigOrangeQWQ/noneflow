services:
  noneflow:
    image: "ghcr.io/bigorangeqwq/noneflow:main"
    environment:
      - APP_ID=${APP_ID}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - PRE_COMMIT_HOME=${PRE_COMMIT_HOME}
      - CONFIG=${CONFIG}
    env_file:
      - noneflo_env.list
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${GITHUB_WORKSPACE}:/github/workspace